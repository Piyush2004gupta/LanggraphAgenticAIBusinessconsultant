name: Deploy to GKE

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for Workload Identity Federation
      packages: 'write' # Required for GHCR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/ai-backend:latest ./backend
          docker push ghcr.io/${{ github.repository_owner }}/ai-backend:latest

      - name: Build and Push Frontend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/ai-frontend:latest ./frontend
          docker push ghcr.io/${{ github.repository_owner }}/ai-frontend:latest

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1067543033888/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '1067543033888-compute@developer.gserviceaccount.com'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: 'langgraph-cluster'
          location: 'asia-south1'

      - name: Deploy to GKE
        run: |
          kubectl rollout restart deployment ai-backend-deployment
          kubectl rollout restart deployment ai-frontend-deployment
