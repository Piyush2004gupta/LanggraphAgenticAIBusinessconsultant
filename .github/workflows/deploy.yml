name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: 'acne-501007'
          workload_identity_provider: 'projects/1067543033888/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '1067543033888-compute@developer.gserviceaccount.com'

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        run: |
          gcloud run deploy ai-backend \
            --source ./backend \
            --region asia-south1 \
            --allow-unauthenticated \
            --quiet

      - name: Get Backend URL
        id: backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe ai-backend --region asia-south1 --format 'value(status.url)')
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy ai-frontend \
            --source ./frontend \
            --region asia-south1 \
            --allow-unauthenticated \
            --set-env-vars VITE_API_URL=${{ steps.backend-url.outputs.url }} \
            --quiet
